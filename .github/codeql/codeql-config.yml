# CodeQL configuration for GitHub code scanning.
#
# Loaded by the workflow at .github/workflows/codeql.yml via its
# `config-file:` argument. (GitHub's default *auto* setup does not
# honour in-repo configs — that's why we ship an advanced workflow.)
#
# Test fixtures and intentionally-vulnerable testbeds exist to validate
# RAPTOR's own dataflow validation pipeline and exploit-feasibility
# analyses. Scanning them produces alerts that look real but are
# by-design honeypots, drowning out signal from actual code.
name: RAPTOR CodeQL config

paths-ignore:
  # IRIS Tier 1 dataflow-validation fixtures (intentionally vulnerable
  # Flask + sys.argv command-injection patterns; CodeQL flags them
  # because they ARE vulnerable, by design).
  - packages/llm_analysis/tests/fixtures/iris_e2e/**
  # core/sandbox tests plant sensitive-named fixtures on purpose
  # (e.g. `real_secret = Path.home() / ".raptor_fake_home_regression.txt"`,
  # `restricted_file.write_text("SECRET-CREDENTIAL\n")`, `SECRET-IN-DEV-SHM`)
  # to verify the sandbox blocks reads of host secrets. CodeQL's
  # heuristic-named sensitive-data sources taint-track these
  # fixtures through `run_untrusted(cmd, ...)` into shared production
  # sandbox code, surfacing `py/clear-text-logging-sensitive-data`
  # alerts on every operator-visibility logger in `core/sandbox/` that
  # interpolates `cmd[:3]`. The findings are FPs by construction — the
  # "secret" is a test variable named to assert isolation, not a real
  # credential. Excluding only this tests directory; other tests/ trees
  # stay scanned.
  - core/sandbox/tests/**
  # Generic test-fixture exclusion for any other deliberately-bad
  # samples a future test adds.
  - "**/tests/fixtures/**"
  - "**/test_fixtures/**"
  # SCA tests assert URL substrings against proxy_hosts allowlists, registry
  # endpoints, and image refs (e.g. ``assert "registry.npmjs.org" in
  # kwargs["proxy_hosts"]``). CodeQL's
  # ``py/incomplete-url-substring-sanitization`` query reads these as
  # host-validation checks — they aren't, they're shape assertions in
  # tests. Same shape as the core/sandbox/tests/** exclusion above.
  - packages/sca/**/tests/**
  # Intentionally vulnerable testbeds used by /scan and /codeql self-tests
  # (python_sql_injection.py, javascript_xss.js, smt_codeql_testbench.c).
  - test/data/**
  # Git worktree mirrors — duplicates of in-tree source that would cause
  # double-counted alerts if scanned.
  - .claude/worktrees/**
